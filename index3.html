<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maurizio Minieri</title>
<link rel = "icon" href = "2022/static/2020/img/icons/logoM.png" type = "image/x-icon">
<link rel="stylesheet" href="font.css">
<link rel="stylesheet" href="style3.css">
</head>
<body>

  <header class="globalnav">
  <div class="globalnav-content">
    <a class="globalnav-logo" href="#"></a>

    <nav class="globalnav-links">
      <div class="nav-item" data-menu="store">Store</div>
      <div class="nav-item" data-menu="mac">Mac</div>
      <div class="nav-item" data-menu="ipad">iPad</div>
      <div class="nav-item" data-menu="iphone">iPhone</div>
      <div class="nav-item" data-menu="watch">Watch</div>
      <div class="nav-item" data-menu="airpods">AirPods</div>
      <div class="nav-item" data-menu="tv">TV & Home</div>
      <div class="nav-item" data-menu="entertainment">Entertainment</div>
      <div class="nav-item" data-menu="accessories">Accessories</div>
      <div class="nav-item" data-menu="support">Support</div>
    </nav>
  </div>
</header>

<!-- Overlay -->
<div class="globalnav-overlay"></div>

<!-- Mega menu -->
<div class="globalnav-megamenu" id="mega-menu">
  <div class="mega-content" id="mega-content"></div>
</div>


<script>
  const items = document.querySelectorAll('.nav-item');
const megaMenu = document.getElementById('mega-menu');
const megaContent = document.getElementById('mega-content');
const overlay = document.querySelector('.globalnav-overlay');

const menus = {
  store: ["Shop", "Latest", "Offers"],
  mac: ["MacBook Air", "MacBook Pro", "iMac", "Mac mini"],
  ipad: ["iPad Pro", "iPad Air", "iPad mini"],
  iphone: ["iPhone 16", "iPhone 15", "Compare"],
  watch: ["Series 10", "SE", "Bands"],
  airpods: ["AirPods Pro", "AirPods 3"],
  tv: ["Apple TV 4K", "HomePod"],
  entertainment: ["Apple TV+", "Music", "Arcade"],
  accessories: ["Cases", "Keyboards", "Cables"],
  support: ["Help", "Repair", "Community"]
};

items.forEach(item => {
  item.addEventListener('mouseenter', () => {
    const menuKey = item.dataset.menu;
    const content = menus[menuKey]
      .map(i => `<div>${i}</div>`)
      .join("");

    megaContent.innerHTML = content;

    megaMenu.classList.add('active');
    overlay.classList.add('active');
  });
});

megaMenu.addEventListener('mouseleave', closeMenu);
overlay.addEventListener('mouseenter', closeMenu);

function closeMenu() {
  megaMenu.classList.remove('active');
  overlay.classList.remove('active');
}

</script>

</body>
</html>
